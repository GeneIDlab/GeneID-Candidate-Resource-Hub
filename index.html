              <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{padding:"7px 11px",border:"none",borderRadius:"5px 5px 0 0",background:activeTab===t.id?WHITE:"transparent",color:activeTab===t.id?NAVY:"rgba(255,255,255,0.5)",fontWeight:activeTab===t.id?700:400,fontSize:11,whiteSpace:"nowrap",borderBottom:activeTab===t.id?`2px solid ${GOLD}`:"2px solid transparent"}}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div style={{padding:"6px 0 56px"}}>{renderContent()}</div>
      <div style={{background:NAVY,padding:"16px 24px",textAlign:"center"}}>
        <a href="mailto:careers@geneidlab.com" style={{color:GOLD,fontWeight:700,fontSize:12,textDecoration:"none"}}>careers@geneidlab.com</a>
        <span style={{color:"rgba(255,255,255,0.3)",margin:"0 10px"}}>|</span>
        <span style={{color:"rgba(255,255,255,0.4)",fontSize:11}}>GeneID Advanced Molecular Diagnostics · GeneIDLab.com · Montvale, NJ · CLIA | CAP | CMS</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
